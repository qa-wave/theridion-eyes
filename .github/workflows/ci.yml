# ─── CI: Theridion (Tauri shell + Python sidecar) ───────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sidecar:
    name: "Python sidecar — syntax + import"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile-check sidecar (HARD GATE)
        working-directory: apps/sidecar
        run: python -m compileall theridion_sidecar -q
