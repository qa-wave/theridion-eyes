#
# Security baseline guard - fail PR pokud chybi povinne security artefakty.
# Spousti se pri kazdem PR + push na hlavni branch.

name: Security baseline

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  baseline:
    name: Check security artefacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Proxy/middleware exists with security headers
        run: |
          set -e
          FOUND=""
          for f in proxy.ts middleware.ts src/middleware.ts; do
            if [[ -f "$f" ]]; then FOUND="$f"; break; fi
          done
          if [[ -z "$FOUND" ]]; then
            echo "::error::Chybi proxy.ts (Next 16+) nebo middleware.ts (Next <= 15)"
            exit 1
          fi
          if ! grep -q "X-Frame-Options" "$FOUND"; then
            echo "::error::$FOUND nema X-Frame-Options header"
            exit 1
          fi
          if ! grep -q "Referrer-Policy" "$FOUND"; then
            echo "::error::$FOUND nema Referrer-Policy header"
            exit 1
          fi
          echo "OK $FOUND ma security headers"

      - name: ai.txt route exists
        run: |
          test -f src/app/ai.txt/route.ts || test -f app/ai.txt/route.ts \
            || { echo "::error::Chybi app/ai.txt/route.ts"; exit 1; }
          echo "OK ai.txt route exists"

      - name: llms.txt route exists
        run: |
          test -f src/app/llms.txt/route.ts || test -f app/llms.txt/route.ts \
            || { echo "::error::Chybi app/llms.txt/route.ts"; exit 1; }
          echo "OK llms.txt route exists"

      - name: Honeypot route exists
        run: |
          test -f src/app/x-honeypot-internal/route.ts || test -f app/x-honeypot-internal/route.ts \
            || { echo "::error::Chybi app/x-honeypot-internal/route.ts"; exit 1; }
          echo "OK honeypot route exists"

      - name: robots.ts has AI crawler awareness
        run: |
          set -e
          FOUND=""
          for f in src/app/robots.ts app/robots.ts; do
            if [[ -f "$f" ]]; then FOUND="$f"; break; fi
          done
          if [[ -z "$FOUND" ]]; then
            echo "::warning::Chybi app/robots.ts - sitemap/host metadata"
          elif ! grep -qE "(AI_CRAWLERS|GPTBot|ClaudeBot|noai)" "$FOUND"; then
            echo "::error::$FOUND nezmiluje AI crawlery (chybi AI_CRAWLERS list nebo noai tag)"
            exit 1
          else
            echo "OK $FOUND zminuje AI crawlery"
          fi

      - name: Vercel firewall config exists
        run: |
          if [[ ! -f .vercel/firewall.json ]]; then
            echo "::warning::Chybi .vercel/firewall.json - spust bin/sync-vercel-firewall.py"
          else
            echo "OK firewall.json exists"
          fi

      - name: No production source maps
        run: |
          # next.config.{ts,js,mjs} by mel mit productionBrowserSourceMaps: false.
          set -e
          FOUND=""
          for f in next.config.ts next.config.js next.config.mjs; do
            if [[ -f "$f" ]]; then FOUND="$f"; break; fi
          done
          if [[ -z "$FOUND" ]]; then
            echo "::warning::Chybi next.config - nemuzu overit source maps"
            exit 0
          fi
          if grep -qE "productionBrowserSourceMaps[[:space:]]*:[[:space:]]*true" "$FOUND"; then
            echo "::error::$FOUND ma productionBrowserSourceMaps: true - mel by byt false"
            exit 1
          fi
          echo "OK source maps disabled (nebo defaultni false)"

      - name: Arcjet wrapper exists
        run: |
          test -f src/lib/security/arcjet.ts || test -f lib/security/arcjet.ts \
            || { echo "::warning::Chybi lib/security/arcjet.ts"; exit 0; }
          echo "OK arcjet wrapper exists"
